<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Productivity Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>AI-Based Productivity Analyzer</h1>
        <p class="subtitle">Analyze your day and discover whether you were Productive, Moderate, or Lazy.</p>

        <div class="input-section">
            <label for="study">Study / Work Hours</label>
            <input type="number" id="study" placeholder="e.g. 6">

            <label for="exercise">Exercise Hours</label>
            <input type="number" id="exercise" placeholder="e.g. 1">

            <label for="sleep">Sleep Hours</label>
            <input type="number" id="sleep" placeholder="e.g. 7">

            <label for="screen">Entertainment / Screen Time Hours</label>
            <input type="number" id="screen" placeholder="e.g. 4">

            <label for="goals">Goals Completed (0-5)</label>
            <input type="number" id="goals" min="0" max="5" placeholder="e.g. 3">

            <button onclick="analyzeProductivity()">Analyze</button>
        </div>

        <div id="result" class="result hidden">
            <h2>Your Result</h2>
            <p><strong>Productivity Level:</strong> <span id="level"></span></p>
            <p><strong>Score:</strong> <span id="score"></span>/100</p>
            <p><strong>Suggestion:</strong> <span id="suggestion"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
